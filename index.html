<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="FITTI — Premium high-protein breakfasts delivered before work. Smoothies, bowls, and breakfast combos starting at ₹99. Upgrade your morning." />
    <meta name="theme-color" content="#76b900" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://fitti.in/" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Fitti" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    
    <!-- Open Graph / Social -->
    <meta property="og:title" content="FITTI — Fitness. Fully Managed." />
    <meta property="og:description" content="High-protein smoothies and breakfast bowls delivered before work. Starting at ₹99." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://fitti.in/" />
    <meta property="og:image" content="https://fitti.in/breakfast-combo.jpg" />
    
    <title>FITTI — Fitness. Fully Managed.</title>

    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "LocalBusiness",
        "name": "FITTI",
        "image": "https://fitti.in/breakfast-combo.jpg",
        "description": "Premium high-protein breakfasts delivered before work. Smoothies, bowls, and breakfast combos starting at ₹99.",
        "url": "https://fitti.in/",
        "telephone": "+919999999999",
        "priceRange": "₹₹",
        "address": {
          "@type": "PostalAddress",
          "addressCountry": "IN"
        },
        "geo": {
          "@type": "GeoCoordinates",
          "latitude": "12.9716",
          "longitude": "77.5946"
        },
        "openingHoursSpecification": {
          "@type": "OpeningHoursSpecification",
          "dayOfWeek": [
            "Monday",
            "Tuesday",
            "Wednesday",
            "Thursday",
            "Friday",
            "Saturday",
            "Sunday"
          ],
          "opens": "06:00",
          "closes": "09:00"
        }
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "ItemList",
        "numberOfItems": 4,
        "itemListElement": [
          {
            "@type": "ListItem",
            "position": 1,
            "item": {
              "@type": "Product",
              "name": "FITTI Choco Fuel",
              "description": "Chocolate protein breakfast smoothie",
              "offers": {
                "@type": "Offer",
                "price": "99",
                "priceCurrency": "INR"
              }
            }
          },
          {
            "@type": "ListItem",
            "position": 2,
            "item": {
              "@type": "Product",
              "name": "FITTI Peanut Power",
              "description": "Banana peanut breakfast smoothie",
              "offers": {
                "@type": "Offer",
                "price": "99",
                "priceCurrency": "INR"
              }
            }
          },
          {
            "@type": "ListItem",
            "position": 3,
            "item": {
              "@type": "Product",
              "name": "FITTI Power Bowl",
              "description": "High-protein breakfast bowl",
              "offers": {
                "@type": "Offer",
                "price": "120",
                "priceCurrency": "INR"
              }
            }
          },
          {
            "@type": "ListItem",
            "position": 4,
            "item": {
              "@type": "Product",
              "name": "FITTI Breakfast Combo",
              "description": "Any smoothie + Power Bowl",
              "offers": {
                "@type": "Offer",
                "price": "219",
                "priceCurrency": "INR"
              }
            }
          }
        ]
      }
    </script>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((reg) => console.log('Service Worker registered:', reg.scope))
            .catch((err) => console.error('Service Worker registration failed:', err));
        });
      }
    </script>
  </body>
</html>
